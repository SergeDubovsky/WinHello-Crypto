name: Security Tests and Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run security scans weekly
    - cron: '0 2 * * 1'

jobs:
  security-scan:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install bandit safety pytest pytest-cov flake8 mypy black
    
    - name: Run security analysis with Bandit
      run: |
        bandit -r . -f json -o bandit-report.json || true
        bandit -r . -f txt
      continue-on-error: true
    
    - name: Check for known security vulnerabilities
      run: |
        safety check --json --output safety-report.json || true
        safety check
      continue-on-error: true
    
    - name: Run code quality checks
      run: |
        # Check code formatting
        black --check --diff .
        
        # Run linting
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Run type checking
      run: |
        mypy hello_crypto.py --ignore-missing-imports || true
        mypy aws_hello_creds.py --ignore-missing-imports || true
        mypy security_utils.py --ignore-missing-imports || true
      continue-on-error: true
    
    - name: Run unit tests with coverage
      run: |
        pytest --cov=. --cov-report=xml --cov-report=html --cov-report=term
      continue-on-error: true
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
    
    - name: Upload security scan results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-reports-${{ matrix.python-version }}
        path: |
          bandit-report.json
          safety-report.json
          htmlcov/
        retention-days: 30

  windows-hello-integration:
    runs-on: windows-latest
    needs: security-scan
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest
    
    - name: Test Windows Hello availability (mock)
      run: |
        python -c "
        import sys
        sys.path.append('.')
        try:
            from hello_crypto import FileEncryptor
            print('✅ hello_crypto module imported successfully')
        except ImportError as e:
            print(f'❌ Import error: {e}')
            sys.exit(1)
        except Exception as e:
            print(f'⚠️  Other error (expected on CI): {e}')
        
        try:
            from aws_hello_creds import AWSCredentialManager
            print('✅ aws_hello_creds module imported successfully')
        except ImportError as e:
            print(f'❌ Import error: {e}')
            sys.exit(1)
        except Exception as e:
            print(f'⚠️  Other error (expected on CI): {e}')
        "
    
    - name: Run Windows-specific tests
      run: |
        # Run tests that don't require actual Windows Hello hardware
        python -m pytest test_security_utils.py -v
        python -m pytest test_hello_crypto.py::TestFileEncryptor::test_encrypt_decrypt_data_roundtrip -v
        python -m pytest test_aws_hello_creds.py::TestAWSCredentialManager::test_validate_profile_name_valid -v
      continue-on-error: true

  documentation-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check README links
      run: |
        # Check for broken links in README (basic check)
        grep -n "http" README.md || echo "No HTTP links found"
        
        # Check that essential sections exist
        grep -q "## Installation" README.md && echo "✅ Installation section found" || echo "❌ Installation section missing"
        grep -q "## Usage" README.md && echo "✅ Usage section found" || echo "❌ Usage section missing"
        grep -q "## Security" README.md && echo "✅ Security section found" || echo "❌ Security section missing"
    
    - name: Check file structure
      run: |
        # Ensure critical files exist
        test -f requirements.txt && echo "✅ requirements.txt exists" || echo "❌ requirements.txt missing"
        test -f setup.py && echo "✅ setup.py exists" || echo "❌ setup.py missing"
        test -f LICENSE && echo "✅ LICENSE exists" || echo "❌ LICENSE missing"
        
        # Check for test files
        find . -name "*test*.py" | wc -l | xargs echo "Test files found:"

  dependency-check:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Check dependency versions
      run: |
        python -m pip install --upgrade pip
        
        # Install and check for dependency conflicts
        pip install -r requirements.txt
        pip check
        
        # List installed packages
        pip list
    
    - name: Test installation
      run: |
        # Test that the package can be installed
        pip install -e .
        python -c "import hello_crypto, aws_hello_creds, security_utils, security_config; print('✅ All modules imported successfully')"