name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:  # Allow manual trigger
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'testpypi'
        type: choice
        options:
        - testpypi
        - pypi

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for proper versioning
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    
    - name: Verify package metadata
      run: |
        echo "Checking package configuration..."
        python -c "
        import tomllib
        with open('pyproject.toml', 'rb') as f:
            config = tomllib.load(f)
        
        project = config['project']
        print(f'Package: {project[\"name\"]}')
        print(f'Version: {project[\"version\"]}')
        print(f'Description: {project[\"description\"]}')
        print(f'Console Scripts: {project.get(\"scripts\", {})}')
        "
    
    - name: Build package
      run: |
        echo "Building wheel and source distribution..."
        python -m build
        
        echo "Built packages:"
        dir dist
    
    - name: Check package contents
      run: |
        echo "Checking package contents..."
        twine check dist/*
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
        retention-days: 7

  publish-to-testpypi:
    needs: build
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'testpypi'
    environment: testpypi
    
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
    
    - name: Publish to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
        password: ${{ secrets.TEST_PYPI_API_TOKEN }}
        print-hash: true

  publish-to-pypi:
    needs: build
    runs-on: windows-latest
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'pypi')
    environment: pypi
    
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
    
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
        print-hash: true

  post-publish:
    needs: [publish-to-pypi]
    runs-on: windows-latest
    if: always() && (needs.publish-to-pypi.result == 'success')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Verify PyPI publication
      run: |
        echo "Waiting for package to be available on PyPI..."
        Start-Sleep -Seconds 60
        
        echo "Testing installation from PyPI..."
        python -m pip install --upgrade winhello-crypto --force-reinstall
        
        echo "Verifying console scripts..."
        winhello-crypto --help
        aws-hello-creds --help
        
        echo "Package successfully published and verified!"
      continue-on-error: true
    
    - name: Create deployment summary
      run: |
        echo "## 🚀 PyPI Deployment Summary" >> $env:GITHUB_STEP_SUMMARY
        echo "" >> $env:GITHUB_STEP_SUMMARY
        echo "✅ **Package**: winhello-crypto" >> $env:GITHUB_STEP_SUMMARY
        echo "✅ **Environment**: PyPI Production" >> $env:GITHUB_STEP_SUMMARY
        echo "✅ **URL**: https://pypi.org/project/winhello-crypto/" >> $env:GITHUB_STEP_SUMMARY
        echo "✅ **Installation**: \`pip install winhello-crypto\`" >> $env:GITHUB_STEP_SUMMARY
        echo "" >> $env:GITHUB_STEP_SUMMARY
        echo "### Available Commands" >> $env:GITHUB_STEP_SUMMARY
        echo "- \`aws-hello-creds\` - AWS credential management" >> $env:GITHUB_STEP_SUMMARY
        echo "- \`winhello-crypto\` - File encryption/decryption" >> $env:GITHUB_STEP_SUMMARY
